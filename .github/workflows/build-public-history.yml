name: Build bounded public VOI history

on:
  workflow_dispatch:
  schedule:
    # Once daily after the 02:10 UTC regional AIS/layer refresh and before Magic Paws mirrors at 03:05 UTC.
    - cron: "50 2 * * *"

permissions:
  contents: write

concurrency:
  group: voodoo-public-products-main
  cancel-in-progress: false

jobs:
  build-history:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build bounded history and derived products
        run: |
          set -euo pipefail
          python scripts/build_public_outputs.py --include-history
          python scripts/analyze_infrastructure_proximity.py
          python scripts/build_public_manifest.py
          node --check public/assets/infrastructure-watch.js

      - name: Validate bounded history
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          history = Path('public/data/vessels/voi_history_14d.jsonl')
          if not history.exists():
              raise SystemExit('bounded public history missing')
          limit = 22 * 1024 * 1024
          if history.stat().st_size > limit:
              raise SystemExit(f'bounded public history exceeds {limit} bytes')
          rows = 0
          with history.open(encoding='utf-8') as handle:
              for line in handle:
                  if line.strip():
                      json.loads(line)
                      rows += 1
          print({'history_rows': rows, 'history_bytes': history.stat().st_size})
          PY

      - name: Commit bounded history products
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            public/data/vessels/voi_history_14d.jsonl \
            public/data/vessels/manifest.json \
            public/data/analysis \
            public/downloads \
            public/data/manifest.json
          if git diff --cached --quiet; then
            echo "No bounded-history changes to commit."
            exit 0
          fi
          git commit -m "Build bounded public VOI history"
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            [ "$attempt" -lt 3 ] && sleep 10
          done
          echo "::error::Failed to push bounded public history after 3 attempts."
          exit 1
