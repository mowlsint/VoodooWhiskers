name: Update regional AIS layers

on:
  workflow_dispatch:
  schedule:
    # Secondary/open-data AIS refresh, twice daily.
    # Morning run follows the daily AISstream test and should finish before the 03:05 UTC Magic Paws mirror fetch.
    - cron: "10 2,14 * * *"

permissions:
  contents: write

concurrency:
  # Shared with the primary maritime-layer workflow: regional work waits instead of writing concurrently.
  group: voodoo-maritime-layers-main
  cancel-in-progress: false

jobs:
  build-regional-layers:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install \
            "requests>=2.32,<3" \
            "websockets>=15,<16" \
            "cryptography>=45,<46"

      - name: Ensure data directory exists
        run: |
          set -euo pipefail
          mkdir -p data

      - name: Fetch Fintraffic and BarentsWatch
        env:
          BARENTSWATCH_CLIENT_ID: ${{ secrets.BARENTSWATCH_CLIENT_ID }}
          BARENTSWATCH_CLIENT_SECRET: ${{ secrets.BARENTSWATCH_CLIENT_SECRET }}
          AIS_APP_NAME: "MOwlSINT Voodoo Whiskers/1.0"
        run: |
          set -euo pipefail
          python scripts/fetch_regional_contacts.py

      - name: Merge available AIS providers
        run: |
          set -euo pipefail
          python scripts/merge_ais_contacts.py

      - name: Debug regional AIS inputs
        run: |
          set -euo pipefail
          echo "--- regional fetch status ---"
          cat data/ais_regional_fetch_status_latest.json || true
          echo "--- provider snapshots ---"
          for f in \
            data/ais_contacts_fintraffic_latest.json \
            data/ais_contacts_barentswatch_latest.json \
            data/ais_contacts_aisstream_latest.json \
            data/ais_contacts_latest.json; do
            if [ -f "$f" ]; then
              echo "### $f"
              python -c 'import json,sys; p=json.load(open(sys.argv[1], encoding="utf-8")); print({k:p.get(k) for k in ("generated_at","source","count","stale","providers_included")})' "$f"
            else
              echo "MISSING: $f"
            fi
          done

      - name: Build layers
        env:
          GFW_TOKEN: ${{ secrets.GFW_TOKEN }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: |
          set -euo pipefail
          python scripts/build_layers.py

      - name: Audit sanctions/watchlist inputs
        run: |
          set -euo pipefail
          python scripts/sync_sanctions_watchlists.py

      - name: Commit updated outputs
        env:
          NTFY_ENABLED: ${{ secrets.NTFY_ENABLED }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          set -euo pipefail

          send_push_failure_ntfy() {
            if [ "${NTFY_ENABLED:-false}" != "true" ] || [ -z "${NTFY_URL:-}" ]; then
              return 0
            fi
            BODY="$(printf 'VOODOO WHISKERS // regional AIS push failed\n\nWorkflow: %s\nRun: %s\nBranch: %s\n' "${GITHUB_WORKFLOW:-Update regional AIS layers}" "${GITHUB_RUN_ID:-unknown}" "${GITHUB_REF_NAME:-main}")"
            if [ -n "${NTFY_TOKEN:-}" ]; then
              curl -fsSL -H "Authorization: Bearer ${NTFY_TOKEN}" -H "Title: VOODOO Regional AIS Push Failed" -H "Priority: high" -H "Tags: warning,ship" --data-binary "$BODY" "$NTFY_URL" || true
            else
              curl -fsSL -H "Title: VOODOO Regional AIS Push Failed" -H "Priority: high" -H "Tags: warning,ship" --data-binary "$BODY" "$NTFY_URL" || true
            fi
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          files=(
            data/ais_contacts_fintraffic_latest.json
            data/ais_contacts_barentswatch_latest.json
            data/ais_contacts_aisstream_latest.json
            data/ais_contacts_latest.json
            data/ais_regional_fetch_status_latest.json
            data/russian_mmsi.geojson
            data/watchlist_live.geojson
            data/sanctions_shadowfleet.geojson
            data/falseflag_interest.geojson
            data/false_flag_watch.geojson
            data/behavioral_voi.geojson
            data/recent_russian_portcall_10d.geojson
            data/neutral_tanker_context.geojson
            data/tanker_cluster_stats.json
            data/voi_snapshot_latest.json
            data/voi_history.jsonl
            data/voi_stats_by_slot.json
            data/watchlist_audit.json
            data/watchlist_changes_latest.md
          )
          for f in "${files[@]}"; do
            [ -e "$f" ] && git add "$f"
          done

          if git diff --cached --quiet; then
            echo "No regional AIS/layer changes to commit."
            exit 0
          fi

          git commit -m "Update regional AIS layers"

          for i in 1 2 3; do
            echo "Push attempt ${i}/3..."
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi
            git rebase --abort || true
            [ "$i" -lt 3 ] && sleep 12
          done

          echo "ERROR: Push failed after 3 attempts."
          send_push_failure_ntfy
          exit 1
