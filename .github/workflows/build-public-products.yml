name: Build public Voodoo Whiskers products
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update maritime layers", "Update regional AIS layers"]
    types: [completed]
permissions:
  contents: write
concurrency:
  group: voodoo-public-products-main
  cancel-in-progress: false
jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v6
        with: {python-version: '3.11'}
      - run: python scripts/build_public_outputs.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          git diff --cached --quiet && exit 0
          git commit -m "Build public Voodoo Whiskers products"
          git pull --rebase --autostash origin main
          git push origin HEAD:main
