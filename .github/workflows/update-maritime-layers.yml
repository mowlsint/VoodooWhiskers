name: Update maritime layers

on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"
    - cron: "30 5 * * *"
    - cron: "30 11 * * *"
    - cron: "30 17 * * *"

permissions:
  contents: write

jobs:
  build-layers:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests websockets

      - name: Fetch contacts
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: |
          mkdir -p data
          python scripts/fetch_contacts.py

      - name: Debug input files
        run: |
          echo "--- data ---"
          ls -la data || true
          echo "--- contacts file ---"
          test -f data/ais_contacts_latest.json && cat data/ais_contacts_latest.json | head -n 40 || true

      - name: Build layers
        env:
          GFW_TOKEN: ${{ secrets.GFW_TOKEN }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: |
          python scripts/build_layers.py

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/ais_contacts_latest.json \
            data/russian_mmsi.geojson \
            data/watchlist_live.geojson \
            data/sanctions_shadowfleet.geojson \
            data/falseflag_interest.geojson \
            data/behavioral_voi.geojson \
            data/voi_snapshot_latest.json \
            data/voi_history.jsonl \
            data/voi_stats_by_slot.json

          git diff --cached --quiet || git commit -m "Update maritime layers"
          git push
