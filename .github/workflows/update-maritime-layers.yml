name: Update maritime layers

on:
  workflow_dispatch:
    inputs:
      certificate_probe_only:
        description: "Only inspect the current AISstream certificate; do not send the API key or build layers"
        required: false
        type: boolean
        default: false
  schedule:
    # One daily AISstream attempt. Emergency certificate pinning is automatically
    # bypassed as soon as normal TLS validation succeeds again.
    - cron: "10 1 * * *"

permissions:
  contents: write

concurrency:
  group: voodoo-maritime-layers-main
  cancel-in-progress: false

env:
  AISSTREAM_TLS_MODE: auto_pinned_emergency
  AISSTREAM_EMERGENCY_PIN_UNTIL: "2026-09-01T00:00:00Z"
  AISSTREAM_PIN_MAX_EXPIRED_DAYS: "60"
  AISSTREAM_MAX_CONNECTION_ATTEMPTS: "3"
  AISSTREAM_OPEN_TIMEOUT_SECONDS: "25"
  AISSTREAM_PROBE_ATTEMPTS: "3"
  AISSTREAM_PROBE_BACKOFF_SECONDS: "10"
  AISSTREAM_SAMPLE_SECONDS: "1800"
  AISSTREAM_MIN_MESSAGES: "1"
  AISSTREAM_MIN_KEPT_CONTACTS: "1"

jobs:
  build-layers:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install \
            "requests>=2.32,<3" \
            "websockets>=15,<16" \
            "cryptography>=45,<46"

      - name: Probe AISstream certificate without API key
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.certificate_probe_only == true }}
        run: |
          set -euo pipefail
          python scripts/fetch_contacts.py --probe-certificate

      - name: Ensure data directory exists
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.certificate_probe_only == false }}
        run: |
          set -euo pipefail
          mkdir -p data

      - name: Fetch contacts with strict TLS or pinned emergency fallback
        id: aisstream_fetch
        continue-on-error: true
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.certificate_probe_only == false }}
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
          AISSTREAM_PINNED_CERT_SHA256: ${{ secrets.AISSTREAM_PINNED_CERT_SHA256 }}
        run: |
          set -euo pipefail
          python scripts/fetch_contacts.py

      - name: Report unavailable AISstream test
        if: ${{ (github.event_name != 'workflow_dispatch' || inputs.certificate_probe_only == false) && steps.aisstream_fetch.outcome == 'failure' }}
        run: |
          echo "::warning title=AISstream unavailable::The daily AISstream test failed. The previous AISstream snapshot is retained; Fintraffic and BarentsWatch remain available to the provider merge."

      - name: Merge available AIS providers
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.certificate_probe_only == false }}
        run: |
          set -euo pipefail
          python scripts/merge_ais_contacts.py

      - name: Debug input files
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.certificate_probe_only == false }}
        run: |
          set -euo pipefail
          echo "--- data directory ---"
          ls -la data || true
          echo "--- AISstream provider file exists? ---"
          if test -f data/ais_contacts_aisstream_latest.json; then
            echo "YES"
            echo "--- transport security ---"
            python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("data/ais_contacts_aisstream_latest.json").read_text(encoding="utf-8"))
          print(json.dumps(payload.get("transport_security", {}), indent=2))
          print(json.dumps(payload.get("fetch_stats", {}), indent=2))
          PY
          else
            echo "NO: no AISstream provider snapshot exists yet; continuing with regional providers."
          fi
          echo "--- merged contacts file exists? ---"
          test -f data/ais_contacts_latest.json && echo "YES" || (echo "NO: data/ais_contacts_latest.json missing" && exit 1)
          echo "--- first lines of merged contacts file ---"
          head -n 40 data/ais_contacts_latest.json || true

      - name: Build layers
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.certificate_probe_only == false }}
        env:
          GFW_TOKEN: ${{ secrets.GFW_TOKEN }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: |
          set -euo pipefail
          python scripts/build_layers.py

      - name: Audit sanctions/watchlist inputs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.certificate_probe_only == false }}
        run: |
          set -euo pipefail
          python scripts/sync_sanctions_watchlists.py

      - name: Debug generated outputs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.certificate_probe_only == false }}
        run: |
          set -euo pipefail
          echo "--- generated files ---"
          ls -la data || true
          echo "--- geojson files ---"
          find data -maxdepth 1 -name "*.geojson" -exec ls -lh {} \;
          echo "--- snapshot ---"
          test -f data/voi_snapshot_latest.json && head -n 40 data/voi_snapshot_latest.json || true

      - name: Commit updated outputs
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.certificate_probe_only == false }}
        env:
          NTFY_ENABLED: ${{ secrets.NTFY_ENABLED }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        run: |
          set -euo pipefail

          send_push_failure_ntfy() {
            if [ "${NTFY_ENABLED:-false}" != "true" ] || [ -z "${NTFY_URL:-}" ]; then
              echo "ntfy disabled or URL missing; not sending push-failure notification."
              return 0
            fi

            BODY="$(printf 'VOODOO WHISKERS // maritime layers push failed\n\nWorkflow: %s\nRun: %s\nBranch: %s\n\nLayer build completed, but push failed after 3 attempts. The next scheduled run will rebuild and try again. Magic Paws VOI data may remain stale until the next successful Voodoo layer update.\n' "${GITHUB_WORKFLOW:-Update maritime layers}" "${GITHUB_RUN_ID:-unknown}" "${GITHUB_REF_NAME:-main}")"

            if [ -n "${NTFY_TOKEN:-}" ]; then
              curl -fsSL \
                -H "Authorization: Bearer ${NTFY_TOKEN}" \
                -H "Title: VOODOO WHISKERS Push Failed" \
                -H "Priority: high" \
                -H "Tags: warning,ship" \
                --data-binary "$BODY" \
                "$NTFY_URL" || true
            else
              curl -fsSL \
                -H "Title: VOODOO WHISKERS Push Failed" \
                -H "Priority: high" \
                -H "Tags: warning,ship" \
                --data-binary "$BODY" \
                "$NTFY_URL" || true
            fi
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            data/ais_contacts_aisstream_latest.json \
            data/ais_contacts_latest.json \
            data/russian_mmsi.geojson \
            data/watchlist_live.geojson \
            data/sanctions_shadowfleet.geojson \
            data/falseflag_interest.geojson \
            data/false_flag_watch.geojson \
            data/behavioral_voi.geojson \
            data/recent_russian_portcall_10d.geojson \
            data/neutral_tanker_context.geojson \
            data/tanker_cluster_stats.json \
            data/voi_snapshot_latest.json \
            data/voi_history.jsonl \
            data/voi_stats_by_slot.json \
            data/watchlist_audit.json \
            data/watchlist_changes_latest.md

          if git diff --cached --quiet; then
            echo "No maritime layer changes to commit."
            exit 0
          fi

          git commit -m "Update maritime layers"

          for i in 1 2 3; do
            echo "Push attempt ${i}/3..."

            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push attempt ${i}/3 failed."
            git rebase --abort || true

            if [ "$i" -lt 3 ]; then
              echo "Waiting before retry..."
              sleep 12
            fi
          done

          echo "ERROR: Push failed after 3 attempts."
          send_push_failure_ntfy
          exit 1
